<!DOCTYPE html>
<html>

<head>
  <title>Optix</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel='stylesheet' href="../css/dashboard.css">
  <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
</head>


<body>

  <div id="dashboard-container">

    <div id="sidebar">
      <h2>Optix</h2>
      <ul>
        <li id="current">Dashboard</li>
        <li>Start Quiz</li>
        <li>History</li>
        <li>Profile</li>
      </ul>
    </div>

    <div id="main-area">

      <div class="header">
        <h1 id="welcome-text">Welcome</h1>
      </div>

      <div class="cards">

        <div class="card" id="card1"> <!-- card uno-->
          <h3>Stats</h3>
          <p>Rating: __</p>
          <p>Quizzes Taken: __</p>
          <p>Overall Accuracy: __</p>
        </div>

        <div class="card" id="card2"> <!-- card dos -->
          <h3>Start Quiz🚀</h3>
          <button id="start-quiz-button">Start</button>
        </div>

        <div class="card" id="card3"> <!-- card tres-->
          <h3>Recent Activity</h3>
          <p>Algrebra - </p>
          <p>Geometry - </p>
          <p>Number Theory - </p>
        </div>

        <div class="card" id="card4"> <!-- card cuatro -->
          <h3>Recomendations</h3>
          <p>Practice Algebra</p>
        </div>

      </div>
    
    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../js/dashboard.js"></script>


</body>


</html>
